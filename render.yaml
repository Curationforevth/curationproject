services:
  - type: web
    name: curation-recommendation
    runtime: docker
    dockerfilePath: recommendation-server/Dockerfile
    dockerContext: recommendation-server
    region: singapore
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
    healthCheckPath: /health
