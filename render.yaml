services:
  - type: web
    name: curation-recommendation
    runtime: docker
    dockerfilePath: recommendation-server/Dockerfile
    dockerContext: recommendation-server
    region: singapore
    plan: free
    # 서버 코드(main/api/engine/config/Dockerfile/data 등)가 바뀔 때만 재배포.
    # scripts·tests·워크플로·마이그레이션·docs push 가 매번 188MB 인덱스 재pull +
    # 재배포를 트리거해 실패·낭비하던 것을 막는다(무료·안정).
    buildFilters:
      paths:
        - recommendation-server/**
      ignoredPaths:
        - recommendation-server/scripts/**
        - recommendation-server/tests/**
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
    healthCheckPath: /health
