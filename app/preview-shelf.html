<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curation — Shelf</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Serif+KR:wght@500;700;900&family=Nanum+Myeongjo:wght@400;700;800&family=Do+Hyeon&family=Gowun+Batang:wght@400;700&family=Black+Han+Sans&family=Gaegu:wght@700&family=Jua&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F6F1EA;--ink:#1C1B1F;--ink-30:#AFAAB6;--warm:#E0D8CC;--acc:#EE6C4D}
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{font-family:'Pretendard',sans-serif;background:#0A090E;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:40px 20px}

  .wrap{display:flex;flex-direction:column;align-items:center}
  .label{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.2);margin-bottom:12px}
  .phone{width:375px;height:812px;border-radius:48px;overflow:hidden;position:relative;display:flex;flex-direction:column;background:var(--bg);box-shadow:0 0 0 2px #1A191E,0 0 0 4px #242328,0 30px 60px -10px rgba(0,0,0,.5)}
  .notch{position:absolute;top:11px;left:50%;transform:translateX(-50%);width:126px;height:36px;background:#000;border-radius:20px;z-index:50}
  .hbar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(0,0,0,.1);border-radius:100px;z-index:50}

  .top{padding:60px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .top-l{display:flex;align-items:baseline;gap:8px}
  .top h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink)}
  .top .cnt{font-size:12px;font-weight:500;color:var(--ink-30)}
  .top-r{display:flex;gap:2px;align-items:center}
  .tb{width:34px;height:34px;border:none;background:none;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .tb svg{width:18px;height:18px}
  .tb.on svg{color:var(--ink)}.tb:not(.on) svg{color:var(--ink-30)}
  .vd{width:1px;height:14px;background:var(--warm);margin:0 1px}

  .shelf-body{flex:1;overflow-y:auto;padding:20px 0 120px}
  .shelf-body::-webkit-scrollbar{display:none}
  .shelf-row{margin-bottom:16px}
  .books{display:flex;align-items:flex-end;padding:0 20px;gap:2px;min-height:190px}
  .shelf-line{height:3px;margin:0 20px;background:linear-gradient(90deg,transparent,var(--warm) 8%,var(--warm) 92%,transparent);border-radius:2px}

  /* Spine container */
  .sp{
    flex-shrink:0;border-radius:3px;overflow:hidden;
    display:flex;flex-direction:column;
    cursor:pointer;transition:transform .25s ease,box-shadow .25s ease;
  }
  .sp:hover{transform:translateY(-8px);box-shadow:0 6px 16px rgba(0,0,0,.1);z-index:2}

  /* Color block zones */
  .sp .zone{display:flex;align-items:center;justify-content:center}

  /* Vertical text */
  .sp .t,.sp .a{
    writing-mode:vertical-rl;text-orientation:mixed;
    line-height:1.2;
  }

  .hint{text-align:center;padding:28px 0 8px;font-size:11px;color:var(--ink-30)}
  .fab{position:absolute;bottom:96px;right:20px;width:52px;height:52px;background:var(--acc);border-radius:16px;border:none;display:flex;align-items:center;justify-content:center;z-index:25;cursor:pointer;box-shadow:0 4px 16px rgba(238,108,77,.28);transition:transform .2s}
  .fab:hover{transform:scale(1.06)}.fab svg{width:22px;height:22px;fill:#fff}
  .bn{position:absolute;bottom:0;left:0;right:0;height:82px;background:rgba(246,241,234,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--warm);display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;z-index:20}
  .ni{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 18px}
  .ni svg{width:22px;height:22px}.ni span{font-size:10px;font-weight:500;font-family:inherit}
  .ni.on svg{color:var(--ink)}.ni.on span{color:var(--ink);font-weight:700}
  .ni:not(.on) svg{color:var(--ink-30)}.ni:not(.on) span{color:var(--ink-30)}
</style>
</head>
<body>
<div class="wrap">
  <div class="label">Shelf</div>
  <div class="phone">
    <div class="notch"></div><div class="hbar"></div>
    <div class="top">
      <div class="top-l"><h1>내 서재</h1><span class="cnt">12권</span></div>
      <div class="top-r">
        <button class="tb"><svg viewBox="0 0 20 20" fill="currentColor"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg></button>
        <div class="vd"></div>
        <button class="tb on"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="17" x2="17" y2="17"/><rect x="4" y="4" width="3" height="13" rx=".5" fill="currentColor" opacity=".1"/><rect x="4" y="4" width="3" height="13" rx=".5"/><rect x="8" y="6" width="4" height="11" rx=".5" fill="currentColor" opacity=".1"/><rect x="8" y="6" width="4" height="11" rx=".5"/><rect x="13" y="3" width="3" height="14" rx=".5" fill="currentColor" opacity=".1"/><rect x="13" y="3" width="3" height="14" rx=".5"/></svg></button>
        <button class="tb" style="margin-left:2px"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg></button>
      </div>
    </div>

    <div class="shelf-body">
      <!-- Row 1 -->
      <div class="shelf-row">
        <div class="books">

          <!-- 1. 작별하지 않는다 -->
          <div class="sp" style="width:38px;height:172px;">
            <div class="zone" style="flex:6;background:#3A2518;padding:10px 5px 0;">
              <span class="t" style="font-family:'Nanum Myeongjo',serif;font-size:11px;font-weight:800;color:#D4C4A8;">작별하지 않는다</span>
            </div>
            <div class="zone" style="flex:3;background:#8B6B4A;padding:0 5px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#D4C4A8;opacity:.6;">한강</span>
            </div>
            <div style="flex:1;background:#D4C4A8;"></div>
          </div>

          <!-- 2. 채식주의자 -->
          <div class="sp" style="width:34px;height:158px;">
            <div class="zone" style="flex:6;background:#2E4418;padding:10px 4px 0;">
              <span class="t" style="font-family:'Black Han Sans',sans-serif;font-size:12px;color:#fff;">채식주의자</span>
            </div>
            <div class="zone" style="flex:3;background:#6B8C28;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#fff;opacity:.5;">한강</span>
            </div>
            <div style="flex:1;background:#C4A832;"></div>
          </div>

          <!-- 3. 소년이 온다 -->
          <div class="sp" style="width:40px;height:174px;">
            <div class="zone" style="flex:6;background:#1A2820;padding:10px 5px 0;">
              <span class="t" style="font-family:'Noto Serif KR',serif;font-size:11px;font-weight:700;color:#E8E4D8;">소년이 온다</span>
            </div>
            <div class="zone" style="flex:3;background:#3A5540;padding:0 5px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#E8E4D8;opacity:.5;">한강</span>
            </div>
            <div style="flex:1;background:#E8E4D8;"></div>
          </div>

          <!-- 4. 흰 -->
          <div class="sp" style="width:24px;height:132px;">
            <div class="zone" style="flex:6;background:#FAFAFA;padding:10px 4px 0;">
              <span class="t" style="font-family:'Gowun Batang',serif;font-size:12px;font-weight:700;color:#3A3632;">흰</span>
            </div>
            <div class="zone" style="flex:3;background:#D0CCC4;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#3A3632;opacity:.4;">한강</span>
            </div>
            <div style="flex:1;background:#E8E4DE;"></div>
          </div>

          <!-- 5. 아몬드 -->
          <div class="sp" style="width:36px;height:168px;">
            <div class="zone" style="flex:6;background:#1A1040;padding:10px 5px 0;">
              <span class="t" style="font-family:'Do Hyeon',sans-serif;font-size:12px;color:#C8B8F0;">아몬드</span>
            </div>
            <div class="zone" style="flex:3;background:#2E1858;padding:0 5px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#C8B8F0;opacity:.5;">손원평</span>
            </div>
            <div style="flex:1;background:#C8B8F0;"></div>
          </div>

          <!-- 6. 불편한 편의점 -->
          <div class="sp" style="width:32px;height:152px;">
            <div class="zone" style="flex:6;background:#8A4420;padding:10px 4px 0;">
              <span class="t" style="font-family:'Jua',sans-serif;font-size:10px;color:#FFFCE8;">불편한 편의점</span>
            </div>
            <div class="zone" style="flex:3;background:#D48830;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#FFFCE8;opacity:.5;">김호연</span>
            </div>
            <div style="flex:1;background:#F0C850;"></div>
          </div>

          <!-- 7. 파친코 -->
          <div class="sp" style="width:44px;height:178px;">
            <div class="zone" style="flex:5;background:#285038;padding:10px 5px 0;">
              <span class="t" style="font-family:'Noto Serif KR',serif;font-size:13px;font-weight:900;color:#fff;">파친코</span>
            </div>
            <div class="zone" style="flex:4;background:#C43830;padding:0 5px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#fff;opacity:.5;">이민진</span>
            </div>
            <div style="flex:1;background:#F0E8D0;"></div>
          </div>

        </div>
        <div class="shelf-line"></div>
      </div>

      <!-- Row 2 -->
      <div class="shelf-row">
        <div class="books">

          <!-- 8. 달러구트 꿈 백화점 -->
          <div class="sp" style="width:30px;height:146px;">
            <div class="zone" style="flex:6;background:#0A1628;padding:10px 4px 0;">
              <span class="t" style="font-family:'Gaegu',cursive;font-size:9px;font-weight:700;color:#A8D0F0;">달러구트 꿈 백화점</span>
            </div>
            <div class="zone" style="flex:3;background:#284870;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#A8D0F0;opacity:.5;">이미예</span>
            </div>
            <div style="flex:1;background:#1A3050;"></div>
          </div>

          <!-- 9. 82년생 김지영 -->
          <div class="sp" style="width:34px;height:156px;">
            <div class="zone" style="flex:6;background:#F8F4F0;padding:10px 4px 0;">
              <span class="t" style="font-family:'Pretendard',sans-serif;font-size:10px;font-weight:800;color:#2A2520;">82년생 김지영</span>
            </div>
            <div class="zone" style="flex:3;background:#E0DCD4;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#2A2520;opacity:.4;">조남주</span>
            </div>
            <div style="flex:1;background:#888480;"></div>
          </div>

          <!-- 10. 지구 끝의 온실 -->
          <div class="sp" style="width:34px;height:162px;">
            <div class="zone" style="flex:6;background:#1A3828;padding:10px 4px 0;">
              <span class="t" style="font-family:'Do Hyeon',sans-serif;font-size:10px;color:#D4E8D0;">지구 끝의 온실</span>
            </div>
            <div class="zone" style="flex:3;background:#3A6848;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#D4E8D0;opacity:.5;">김초엽</span>
            </div>
            <div style="flex:1;background:#D4E8D0;"></div>
          </div>

          <!-- 11. 모순 -->
          <div class="sp" style="width:28px;height:148px;">
            <div class="zone" style="flex:6;background:#4A3828;padding:10px 4px 0;">
              <span class="t" style="font-family:'Nanum Myeongjo',serif;font-size:12px;font-weight:800;color:#F0E8D4;">모순</span>
            </div>
            <div class="zone" style="flex:3;background:#7A6850;padding:0 4px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#F0E8D4;opacity:.5;">양귀자</span>
            </div>
            <div style="flex:1;background:#A89880;"></div>
          </div>

          <!-- 12. 종의 기원 -->
          <div class="sp" style="width:38px;height:168px;">
            <div class="zone" style="flex:6;background:#0A0808;padding:10px 5px 0;">
              <span class="t" style="font-family:'Noto Serif KR',serif;font-size:11px;font-weight:900;color:#D8C840;">종의 기원</span>
            </div>
            <div class="zone" style="flex:3;background:#282018;padding:0 5px 6px;align-items:flex-end;">
              <span class="a" style="font-size:7px;color:#D8C840;opacity:.5;">정유정</span>
            </div>
            <div style="flex:1;background:#D8C840;"></div>
          </div>

        </div>
        <div class="shelf-line"></div>
      </div>

      <div class="hint">길게 눌러서 위치를 바꿔보세요</div>
    </div>

    <button class="fab"><svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
    <div class="bn">
      <button class="ni on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg><span>서재</span></button>
      <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span>탐색</span></button>
      <button class="ni"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>프로필</span></button>
    </div>
  </div>
</div>
</body>
</html>
