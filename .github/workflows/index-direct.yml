name: Build Index (direct connection)

# 무료 Supabase 가 PostgREST 로 235MB 벡터 serving 시 과부하(57014/522)로 죽는 문제를
# 회피: 직접 psycopg(pooler)로 v3 keyset read + 기존 pkl reason 재사용(재임베딩 0).
# Actions 네트워크로 LFS 커밋(로컬 281MB 업로드 불가 회피). 수동 dispatch 전용.

on:
  workflow_dispatch: {}

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install numpy python-dotenv "psycopg[binary]"

      - name: Build index (direct connection)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          cd recommendation-server
          python3 scripts/index_rebuild_direct.py

      - name: Measure index RSS (Linux proxy for Render 512MB)
        run: |
          cd recommendation-server
          python3 - <<'PY'
          import resource, sys
          sys.path.insert(0, ".")
          from engine.loader import load_index
          idx, meta, built, pre, dm, am, bo = load_index()
          n = sum(len(r) for r in pre.values()) if pre else 0
          mb = resource.getrusage(resource.RUSAGE_SELF).ru_maxrss / 1024
          # ru_maxrss = unpickle peak 포함 과대측정. Render 한도 512MB 기준 게이트.
          # 9483 인덱스 steady ~404(로컬 실측). peak<500 이면 Render(512) 부팅 생존.
          print(f"::notice::INDEX_RSS books={len(idx.book_ids)} reasons={n} peakRSS={mb:.0f}MB")
          print(f"INDEX_RSS_MB={mb:.0f}")
          # ru_maxrss = unpickle 순간peak. steady 는 attach 로 ~357(로컬 실측). peak<512 면
          # Render 부팅 생존 후 steady 로 안정. 게이트=실한도 511. 배포 후 /health 로 최종확인.
          if mb > 511:
              print(f"::error::RSS {mb:.0f}MB >= 512 — 실제로 안 맞음. mmap/cap 필요."); sys.exit(1)
          PY

      - name: Commit and push index.pkl
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recommendation-server/data/index.pkl
          git diff --cached --quiet || git commit -m "chore: rebuild index.pkl (direct, 9483 coverage)"
          git push
