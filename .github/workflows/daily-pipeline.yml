# 일일 파이프라인 — 단계별 독립 job, 가능한 병렬 실행.
#
# 의존성 구조:
#   [병렬] discovery, collect, enrich, refresh-loan-count  ← 각각 독립적으로 실행 가능
#   [순차] build-and-recompute ← discovery, collect, enrich 완료 후
#
# enrich는 이미 DB에 있는 rich_description 보유 책을 처리하므로
# discovery/collect 완료를 기다릴 필요 없음.
# YES24 스크래핑은 별도 workflow (daily-scrape.yml, 2시간마다).

name: Daily Pipeline

on:
  # 무료 구조 (2026-06-25): 레포 공개로 GitHub Actions 무제한 무료. 스케줄은
  # 축적(discovery/collect/enrich)만 자동으로 돌린다 — egress·OpenAI 무거운
  # build-and-recompute 는 아래 if 로 수동(workflow_dispatch) 전용. 인덱스 빌드·배포는
  # 항상 사람이 수동 트리거(미검증 인덱스 자동배포 방지 + 무료 유지).
  schedule:
    - cron: '0 18 * * *'  # 매일 03:00 KST — 축적 jobs 만 자동
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 규모 (small=소량 검증 / full=평소 prod 규모)'
        type: choice
        options: [full, small]
        default: full

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # mode=small (workflow_dispatch) 일 때만 소량. schedule 및 full 은 아래 'else' 값
  # = 기존 prod 규모 그대로(동작 불변). small 은 실제 Actions 환경 end-to-end 검증용.
  GENRE_LIMIT: ${{ github.event.inputs.mode == 'small' && '5' || '300' }}
  COLLECT_TARGET: ${{ github.event.inputs.mode == 'small' && '3' || '200' }}
  ENRICH_LIMIT: ${{ github.event.inputs.mode == 'small' && '5' || '500' }}
  TIER1_LIMIT: ${{ github.event.inputs.mode == 'small' && '3' || '0' }}
  V3_LIMIT: ${{ github.event.inputs.mode == 'small' && '3' || '99999' }}
  REASON_LIMIT: ${{ github.event.inputs.mode == 'small' && '3' || '200' }}
  TIER2_LIMIT: ${{ github.event.inputs.mode == 'small' && '3' || '0' }}
  LOAN_LIMIT: ${{ github.event.inputs.mode == 'small' && '5' || '200' }}

jobs:
  # ── 수집: 정보나루 ──────────────────────────
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Discovery (Tier 1)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA4LIBRARY_API_KEY: ${{ secrets.DATA4LIBRARY_API_KEY }}
        run: python3 scripts/data4library_discovery_collector.py --tier 1
      - name: Backfill genre (알라딘 → genre NULL 책)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: python3 scripts/backfill_genre.py --limit $GENRE_LIMIT

  # ── 수집: 알라딘 + 보강 + Tier 1 임베딩 ────
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Aladin batch collect
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALADIN_TTB_KEY: ${{ secrets.ALADIN_TTB_KEY }}
        run: python scripts/smart_batch_collector.py --phase item_list --daily-target $COLLECT_TARGET
      - name: Batch enricher (color + font)
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/batch_enricher.py --limit $ENRICH_LIMIT
      - name: Tier 1 embedder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/tier1_embedder.py --limit $TIER1_LIMIT

  # ── 보강: 기존 책 v3 + reason + tier2 (수집과 병렬) ──
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: v3 vectors
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/generate_book_v3_vectors.py $V3_LIMIT
      - name: Reason extraction (v3)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/v3_reason_extract.py --limit $REASON_LIMIT
      - name: Tier 2 embedder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/tier2_embedder.py --limit $TIER2_LIMIT
      - name: Backfill feedback embeddings (요청경로 비차단 → 실패분 채움)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/backfill_feedback_embedding.py

  # ── 대출 수 갱신: 기존 책 loan_count 순환 갱신 ──────
  refresh-loan-count:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Refresh loan_count (oldest 200)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATA4LIBRARY_API_KEY: ${{ secrets.DATA4LIBRARY_API_KEY }}
        run: python3 scripts/refresh_loan_count.py --limit $LOAN_LIMIT

  # ── 마무리: 인덱스 빌드 + 취향 재계산 (수동 전용) ──
  build-and-recompute:
    # 수동(workflow_dispatch) 전용. build_index 는 전체 v3 벡터 read(Supabase egress
    # ~70MB) + reason 전량 build-임베딩(OpenAI). 스케줄로 매일 돌면 무료가 아니다
    # (egress ~2GB/월 + OpenAI ~$5/월). 인덱스 빌드·배포는 사람이 수동 트리거한다.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'small'
    needs: [discovery, collect, enrich]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r scripts/requirements.txt
      - name: Build recommendation index
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd recommendation-server
          python3 scripts/build_index.py --incremental
      - name: Commit index.pkl (DISARMED — 자동 배포 금지)
        run: |
          echo "⚠️ index.pkl 자동 커밋/배포 무장해제됨 (2026-06-25)."
          echo "토대 복구(reason 안전 + 커버리지) 검증 후 build-index.yml 수동 dispatch +"
          echo "artifact 검증(reason>0, books_loaded)으로만 배포한다. defense-in-depth."
          # git config user.name "github-actions[bot]"
          # git config user.email "github-actions[bot]@users.noreply.github.com"
          # git add recommendation-server/data/index.pkl
          # git diff --cached --quiet || git commit -m "chore: rebuild index.pkl ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          # git push
      - name: Taste vector recomputation
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python3 scripts/taste_recomputer.py --limit 500
